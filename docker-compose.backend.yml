# PrintMRP Backend — PostgreSQL + Express API
#
# One-command bring-up:
#   docker compose -f docker-compose.backend.yml up -d --build
#
# After it's up:
#   http://localhost:4000       — backend API
#   http://localhost:4000/health — health check
#
# Config knobs (override in a .env file at the project root):
#   POSTGRES_PASSWORD  – DB password (default: printmrp)
#   JWT_SECRET         – JWT signing secret (CHANGE THIS: `openssl rand -hex 64`)
#   SEED_ADMIN_EMAIL   – default admin email (default: admin@printmrp.app)
#   SEED_ADMIN_PASSWORD– default admin password (default: admin123)
#   APP_PORT           – host port for backend API (default: 4000)
#   DB_PORT            – host port for postgres (default: 5432)
#
# Useful commands:
#   docker compose -f docker-compose.backend.yml logs -f       # tail everything
#   docker compose -f docker-compose.backend.yml logs -f backend
#   docker compose -f docker-compose.backend.yml ps
#   docker compose -f docker-compose.backend.yml exec backend npm run prisma:migrate:dev
#   docker compose -f docker-compose.backend.yml down          # stop, keep data
#   docker compose -f docker-compose.backend.yml down -v       # stop + delete database (DESTRUCTIVE)

services:
  db:
    image: postgres:16
    container_name: printmrp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: printmrp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-printmrp}
      POSTGRES_DB: printmrp
    volumes:
      - printmrp_pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U printmrp -d printmrp"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
    container_name: printmrp-api
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://printmrp:${POSTGRES_PASSWORD:-printmrp}@db:5432/printmrp?schema=public"
      PORT: "4000"
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@printmrp.app}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-PrintMRP Admin}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s

volumes:
  printmrp_pgdata:
